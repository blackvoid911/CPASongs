<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Screenshot 1 - Home</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1920px; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  .phone {
    width: 1080px; height: 1920px;
    background: #0F172A;
    display: flex; flex-direction: column;
    align-items: center;
    position: relative;
  }
  .status-bar {
    width: 100%; height: 80px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; color: rgba(241,245,249,0.7); font-size: 28px; font-weight: 500;
  }
  .content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 40px 0; }
  .logo {
    width: 320px; height: 320px;
    margin-top: 60px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-circle {
    width: 280px; height: 280px;
    background: linear-gradient(135deg, #4A90D9, #1E3A5F);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }
  .logo-circle span { font-size: 140px; color: white; }
  .org-name {
    margin-top: 50px;
    font-size: 48px; font-weight: 700; color: #F1F5F9;
    text-align: center; line-height: 1.3;
    padding: 0 60px;
  }
  .verse {
    margin-top: 30px;
    font-size: 36px; font-weight: 500; color: #4A90D9;
    text-align: center; padding: 0 80px;
    font-style: italic; line-height: 1.5;
  }
  .mission {
    margin-top: 20px;
    font-size: 28px; color: #94A3B8;
    text-align: center; padding: 0 80px;
    line-height: 1.6;
  }
  .menu { margin-top: 60px; width: 100%; padding: 0 40px; display: flex; flex-direction: column; gap: 28px; }
  .menu-card {
    background: #1E293B;
    border-radius: 32px; padding: 40px 44px;
    display: flex; align-items: center; gap: 32px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .menu-icon {
    width: 88px; height: 88px; border-radius: 20px;
    background: linear-gradient(135deg, #4A90D9, #2E5B8A);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; color: white; flex-shrink: 0;
  }
  .menu-title { font-size: 38px; font-weight: 600; color: #F1F5F9; }
  .menu-arrow { margin-left: auto; font-size: 36px; color: #94A3B8; }

  /* Caption banner */
  .caption-banner {
    position: absolute; top: 0; left: 0; right: 0;
    height: 200px;
    background: linear-gradient(135deg, #4A90D9, #1E3A5F);
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
  }
  .caption-text {
    font-size: 52px; font-weight: 800; color: white;
    text-align: center; letter-spacing: 1px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }
  .content { margin-top: 140px; }
</style>
</head>
<body>
<div class="phone">
  <div class="caption-banner">
    <div class="caption-text">Your Church Companion App</div>
  </div>

  <div class="content">
    <div class="logo">
      <div class="logo-circle"><span>✝</span></div>
    </div>
    <div class="org-name">Calvary Pentecostal Assemblies of Pakistan</div>
    <div class="verse">"Go ye into all the world, and preach the gospel."</div>
    <div class="mission">Spreading faith, hope, and love through worship, ministry, and community service across Pakistan and beyond.</div>
    <div class="menu">
      <div class="menu-card">
        <div class="menu-icon">🎵</div>
        <div class="menu-title">Song Book</div>
        <div class="menu-arrow">›</div>
      </div>
      <div class="menu-card">
        <div class="menu-icon">📖</div>
        <div class="menu-title">Bible</div>
        <div class="menu-arrow">›</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
