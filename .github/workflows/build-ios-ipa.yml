name: Build iOS IPA (Manual Trigger)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'device'
        type: choice
        options:
          - device
          - simulator

jobs:
  build-ios-ipa:
    name: Build iOS App
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission
        run: chmod +x gradlew
      
      - name: Build KMP Framework (Device)
        if: github.event.inputs.build_type == 'device'
        run: |
          echo "Building KMP framework for iOS Device..."
          ./gradlew :shared:linkReleaseFrameworkIosArm64 --no-daemon --stacktrace
      
      - name: Build KMP Framework (Simulator)
        if: github.event.inputs.build_type == 'simulator'
        run: |
          echo "Building KMP framework for iOS Simulator..."
          ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 --no-daemon --stacktrace
      
      - name: Verify Framework Built
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "device" ]; then
            FRAMEWORK_PATH="shared/build/bin/iosArm64/releaseFramework/shared.framework"
            if [ -d "$FRAMEWORK_PATH" ]; then
              echo "✅ KMP framework built successfully"
            else
              echo "❌ Framework not found"
              exit 1
            fi
          else
            FRAMEWORK_PATH="shared/build/bin/iosSimulatorArm64/debugFramework/shared.framework"
            if [ -d "$FRAMEWORK_PATH" ]; then
              echo "✅ KMP framework built successfully"
            else
              echo "❌ Framework not found"
              exit 1
            fi
          fi
      
      - name: Copy Assets
        run: |
          echo "Copying assets to iOS bundle..."
          cp app/src/main/assets/urdusongs.json iosApp/iosApp/ || true
          cp app/src/main/assets/englishsongs.json iosApp/iosApp/ || true
          cp -r app/src/main/assets/bible iosApp/iosApp/ || true
      
      - name: Build iOS App (Device)
        if: github.event.inputs.build_type == 'device'
        run: |
          cd iosApp
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            clean build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Build iOS App (Simulator)
        if: github.event.inputs.build_type == 'simulator'
        run: |
          cd iosApp
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            -derivedDataPath ./build \
            clean build
      
      - name: Create IPA (Device Only)
        if: github.event.inputs.build_type == 'device'
        run: |
          cd iosApp/build/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -r iosApp.app Payload/
          zip -r ../iosApp-unsigned.ipa Payload/
          echo "✅ Unsigned IPA created"
          ls -lh ../iosApp-unsigned.ipa
      
      - name: Upload IPA
        if: github.event.inputs.build_type == 'device'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: iosApp/build/Build/Products/iosApp-unsigned.ipa
          retention-days: 30
      
      - name: Upload Simulator App
        if: github.event.inputs.build_type == 'simulator'
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: iosApp/build/Build/Products/Debug-iphonesimulator/iosApp.app
          retention-days: 14
      
      - name: Build Summary
        run: |
          echo "## ✅ iOS Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Build Type: ${{ github.event.inputs.build_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- Framework: Built successfully" >> $GITHUB_STEP_SUMMARY
          echo "- App: Built successfully" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.build_type }}" == "device" ]; then
            echo "- IPA: ✅ Created" >> $GITHUB_STEP_SUMMARY
          fi

