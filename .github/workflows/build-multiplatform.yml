name: Build Android & iOS (KMP)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger

jobs:
  # ============ ANDROID BUILD ============
  build-android:
    name: Build Android (KMP)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Shared Module (Android)
        run: ./gradlew :shared:compileDebugKotlinAndroid --no-daemon --stacktrace
      
      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
      
      - name: Build Release AAB (if keystore exists)
        run: |
          if [ -f "app/cpasongs-release-key.keystore" ]; then
            echo "Building signed release AAB..."
            ./gradlew :app:bundleRelease --no-daemon --stacktrace
          else
            echo "Keystore not found - skipping release build"
            echo "Add keystore as GitHub secret for release builds"
          fi
      
      - name: Upload Release AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: ignore

  # ============ iOS BUILD ============
  build-ios:
    name: Build iOS (KMP)
    runs-on: macos-14  # macOS with Xcode 15+
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Verify macOS environment
        run: |
          echo "Running on macOS: $(sw_vers -productVersion)"
          echo "Xcode version: $(xcodebuild -version | head -n 1)"
          echo "Available simulators:"
          xcrun simctl list devices available | grep -E "iPhone|iPad" | head -5
      
      - name: Build KMP Shared Framework (iOS Simulator)
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 --no-daemon --stacktrace
      
      - name: Verify Framework Built
        run: |
          FRAMEWORK_PATH="shared/build/bin/iosSimulatorArm64/debugFramework/shared.framework"
          if [ -d "$FRAMEWORK_PATH" ]; then
            echo "✅ KMP framework built successfully"
            ls -lh "$FRAMEWORK_PATH"
            echo "Framework structure:"
            ls -R "$FRAMEWORK_PATH"
          else
            echo "❌ Framework not found at $FRAMEWORK_PATH"
            exit 1
          fi
      
      - name: Build iOS App (Simulator)
        run: |
          cd iosApp
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            -derivedDataPath ./build \
            build
      
      - name: Verify iOS Build Output
        run: |
          if [ -d "iosApp/build/Build/Products/Debug-iphonesimulator/iosApp.app" ]; then
            echo "✅ iOS app built successfully"
            ls -lh iosApp/build/Build/Products/Debug-iphonesimulator/iosApp.app
          else
            echo "❌ iOS app not found"
            exit 1
          fi
      
      - name: Upload iOS Simulator Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: iosApp/build/Build/Products/Debug-iphonesimulator/iosApp.app
          retention-days: 14

  # ============ iOS DEVICE BUILD (Release) ============
  build-ios-device:
    name: Build iOS Device (KMP)
    runs-on: macos-14
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build KMP Shared Framework (iOS Device)
        run: ./gradlew :shared:linkReleaseFrameworkIosArm64 --no-daemon --stacktrace
      
      - name: Verify Framework Built
        run: |
          FRAMEWORK_PATH="shared/build/bin/iosArm64/releaseFramework/shared.framework"
          if [ -d "$FRAMEWORK_PATH" ]; then
            echo "✅ KMP release framework built successfully"
            ls -lh "$FRAMEWORK_PATH"
          else
            echo "❌ Framework not found"
            exit 1
          fi
      
      - name: Build iOS App (Device - unsigned)
        run: |
          cd iosApp
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Create IPA (if needed for distribution)
        run: |
          cd iosApp/build/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -r iosApp.app Payload/
          zip -r ../iosApp-unsigned.ipa Payload/
          echo "✅ Unsigned IPA created for testing"
      
      - name: Upload iOS Device Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-device-unsigned
          path: iosApp/build/Build/Products/iosApp-unsigned.ipa
          retention-days: 30

  # ============ GRADLE VERIFICATION ============
  verify-gradle:
    name: Verify Gradle Configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Gradle Version
        run: ./gradlew --version
      
      - name: List All Tasks
        run: ./gradlew tasks --no-daemon
      
      - name: Check Dependencies
        run: ./gradlew :shared:dependencies --configuration debugCompileClasspath --no-daemon | head -100

  # ============ BUILD SUMMARY ============
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: always()
    
    steps:
      - name: Summary
        run: |
          echo "## 🏗️ Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Android  | ${{ needs.build-android.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| iOS      | ${{ needs.build-ios.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Android Debug APK" >> $GITHUB_STEP_SUMMARY
          echo "- Android Release AAB (if keystore available)" >> $GITHUB_STEP_SUMMARY
          echo "- iOS Simulator App" >> $GITHUB_STEP_SUMMARY
          echo "- iOS Device Build (main branch only)" >> $GITHUB_STEP_SUMMARY

